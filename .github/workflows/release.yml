name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  releaser:
    if: github.ref != 'refs/heads/v2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Delete existing release
        run: |
          gh release view ${{ github.ref_name }} &>/dev/null && \
            gh release delete ${{ github.ref_name }} --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    if: github.ref != 'refs/heads/v2'
    runs-on: ubuntu-latest
    needs: [releaser]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          lfs: false

      - name: Stage binaries for Docker build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bin
          gh release download ${{ github.ref_name }} \
            --pattern "subs-check-pro_Linux_*.tar.gz" \
            --dir /tmp/assets

          declare -A arch_map=([x86_64]=amd64 [aarch64]=arm64 [armv7]=arm)
          for key in "${!arch_map[@]}"; do
            file="/tmp/assets/subs-check-pro_Linux_${key}.tar.gz"
            [ -f "$file" ] || { echo "Missing: $file"; continue; }
            tar xzf "$file" -C bin \
              --transform="s/.*/subs-check-pro-linux-${arch_map[$key]}/" \
              subs-check-pro
            echo "✓ bin/subs-check-pro-linux-${arch_map[$key]}"
          done

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ (beta|alpha|rc|dev|snapshot) ]]; then
            echo "is_pre=true" >> $GITHUB_OUTPUT
          else
            echo "is_pre=false" >> $GITHUB_OUTPUT
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=match,pattern=^v?(.*)$,group=1
          flavor: |
            latest=${{ steps.prerelease.outputs.is_pre == 'false' }}
          labels: |
            org.opencontainers.image.title=subs-check-pro
            org.opencontainers.image.description=高性能代理检测筛选工具，支持高并发测活、测速、媒体检测

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max # ← 完整构建来源
          sbom: true # ← 软件物料清单
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    if: github.ref != 'refs/heads/v2'
    runs-on: ubuntu-latest
    needs: [releaser, docker]

    permissions:
      contents: read

    steps:
      - name: Get release notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'notes<<EOF'
            gh release view "${{ github.ref_name }}" --json body -q .body
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Send notifications
        uses: sinspired/multi-release-notify@v1
        with:
          summary: "由于原仓库触发审查，本版本合并精简了历史提交，删除部分敏感内容。"
          # release_notes: ${{ steps.release.outputs.notes }}
          release_notes: |
            ## 🚀 发布说明

            ### ✨ 新功能
            1. **新增 Copilot 解锁检测**，支持 GitHub Copilot 可用性检测
            2. **新增 URL 列表拖拽排序**，提升订阅管理体验
            3. **新增媒体检测超时设置项**，支持 WebUI 配置检测超时时间
            4. **新增协议筛选与平台筛选一键重置按钮**
            5. **新增小屏日志折叠/展开功能**，自动保存折叠状态

            ### ⚡ 性能优化
            6. **支持 HTTP/2 及连接复用**，优化通知发送效率
            7. **重构订阅获取与解析逻辑**，提高解析成功率，支持 Markdown 正则解析
            8. **优化内存管理**，修复历史遗留内存泄漏问题，主动内存回收可配置
            9. **优化 ETA 算法与下载测速流量计算逻辑**
            10. **优化 Gemini 检测**，正确识别欧盟政策地区，新增 HK/MO 支持

            ### 🐛 问题修复
            11. **修复 sub-store 端口禁用时重载配置导致重启的错误**
            12. **修复分阶段进度模式下的 UI 显示异常**（已检测数量、进度条强制结束等）
            13. **修复 GitHub 代理检测**，校验 SHA256，避免虚假代理干扰
            14. **修复触屏拖拽排序兼容性问题**
            15. **修复 mihomo 覆写规则中的正则表达式错误**

            ### 🔧 基础设施与依赖更新
            16. **升级 goreleaser 至 v7**，使用 UPX 压缩编译产物
            17. **Docker 基础镜像从 Alpine 替换为含 glibc 的镜像**，提高兼容性
            18. **更新 mihomo → v1.19.23、Node.js → v24.15.0、sub-store → 2.22.21**
            19. **优化 Docker 构建 CI 流程**，改进二进制文件解压命名规则
            20. **移除 Git LFS，清理仓库结构**，更新 README 文档

          email_url: ${{ secrets.EMAIL_APPRISE_URL }}
          telegram_url: ${{ secrets.TELEGRAM_APPRISE_URL }}
          slack_url: ${{ secrets.DINGTALK_APPRISE_URL }}
          bark_url: ${{ secrets.BARK_APPRISE_URL }}

          urls: |
            ntfy://subs-check-pro
