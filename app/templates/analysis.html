<!-- app\templates\analysis.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析报告 - Subs-Check-PRO</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon/favicon.svg" />
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="/static/js/libs/yaml.bundle.js?v20260109"></script>
    <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
        margin: 0; padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    /* login scene */
    .login-scene {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 24px 16px; min-height: 100vh; gap: 16px;
    }
    .login-card {
        width: 100%; max-width: 400px; border-radius: 16px;
        padding: 42px 28px 12px; box-shadow: var(--glass-shadow);
        animation: fadeUp 0.3s ease-out; overflow: hidden;
    }
    .login-card-body { padding-bottom: 24px; }
    .login-card-footer {
        border-top: 1px solid var(--border); padding: 10px 0;
        width:100%; display: flex; justify-content: space-between; align-items: center;
    }
    .brand-info { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; color: var(--muted); }
    .brand-info img { width: 14px; height: 14px; }
    .footer-meta { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .login-bottom { margin-top:20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }

    /* report scene */
    .report-scene { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

    .topbar {
        display: flex; align-items: center; justify-content: space-between;
        height: 52px; padding: 0 16px 0 20px;
        border-bottom: 1px solid var(--border); background: var(--glass-bg);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        flex-shrink: 0; z-index: 100;
    }
    .topbar-brand { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--muted); }
    .topbar-brand img { width: 16px; height: 16px; }
    .topbar-meta { flex: 1; text-align: center; font-size: 10px; color: var(--muted); letter-spacing: 0.04em; padding: 0 12px; }
    .topbar-actions { display: flex; align-items: center; gap: 6px; }
    .topbar-btn {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border);
        background: transparent; color: var(--muted);
        font-size: 11px; font-weight: 600; font-family: inherit;
        cursor: pointer; transition: color .15s, border-color .15s, background .15s; white-space: nowrap;
    }
    .topbar-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
    .topbar-btn:hover { color: var(--fg); border-color: var(--fg); background: color-mix(in srgb, var(--fg) 6%, transparent); }
    .topbar-btn.danger:hover { color: var(--danger); border-color: var(--danger); background: color-mix(in srgb, var(--danger) 8%, transparent); }

    .body-area { display: flex; flex: 1; overflow: hidden; }

    /* sidebar */
    .sidebar {
        width: 180px; flex-shrink: 0;
        border-right: 1px solid var(--border); background: var(--glass-bg);
        display: flex; flex-direction: column; justify-content: flex-start;
        gap: 2px; padding: 12px 8px; overflow-y: auto; scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    .sidebar-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 4px 8px 8px; opacity: .6; }
    .sidebar-btn {
        display: flex; align-items: center; gap: 10px;
        padding: 9px 10px; border-radius: 8px; border: none;
        background: transparent; color: var(--muted);
        font-size: 12px; font-weight: 600; font-family: inherit;
        cursor: pointer; transition: color .15s, background .15s; text-align: left; width: 100%;
    }
    .sidebar-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-btn .s-badge { margin-left: auto; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 99px; background: var(--border); color: var(--muted); flex-shrink: 0; }
    .sidebar-btn:hover { color: var(--fg); background: color-mix(in srgb, var(--fg) 6%, transparent); }
    .sidebar-btn.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
    .sidebar-btn.active .s-badge { background: color-mix(in srgb, var(--accent) 20%, transparent); color: var(--accent); }
    .sidebar-divider { display: block; height: 0; border-top: 1px solid var(--border); margin: 4px; flex-shrink: 0; align-self: stretch; }

    /* tab bar (small screen) */
    .tab-bar {
        display: none; align-items: center; justify-content: center;
        gap: 2px; padding: 0 12px; height: 44px;
        border-bottom: 1px solid var(--border); background: var(--glass-bg);
        overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 12px; border-radius: 8px; border: none;
        background: transparent; color: var(--muted);
        font-size: 12px; font-weight: 600; font-family: inherit;
        cursor: pointer; white-space: nowrap;
        transition: color .15s, background .15s; flex-shrink: 0;
    }
    .tab-btn svg { width: 13px; height: 13px; }
    .tab-btn:hover { color: var(--fg); background: color-mix(in srgb, var(--fg) 6%, transparent); }
    .tab-btn.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

    /* content area */
    .content-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px 24px; }
    .tab-content.active { display: block; }
    .tab-inner { max-width: 1100px; margin: 0 auto; }

    /* responsive */
    @media (max-width: 720px) {
        .sidebar      { display: none; }
        .tab-bar      { display: flex; }
        .topbar-meta  { display: none; }
        .tab-btn span { display: none; }
        .tab-content  { padding: 12px; }
        .geo-split    { grid-template-columns: 1fr; }
        .geo-col + .geo-col { border-left: none; border-top: 1px solid var(--border); }
        .overview-grid      { grid-template-columns: 1fr !important; }
        .summary-chips-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .proto-grid   { grid-template-columns: 1fr !important; }
        .cfg-analysis-grid  { grid-template-columns: 1fr !important; }
        /* 复制按钮小屏：只留图标 */
        .copy-btn .btn-text { display: none; }
        .copy-btn { padding: 6px 8px; }
        /* 极窄屏隐藏 checkbox 文字 */
        .scope-text { display: none; }
    }
    @media (min-width: 721px) and (max-width: 1100px) {
        .overview-grid { grid-template-columns: 1fr 1fr; }
        .summary-chips-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1101px) {
        .tab-content { padding: 24px 32px; }
        .overview-grid { grid-template-columns: 1fr 1fr 1fr; }
        .summary-chips-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* common */
    .status-badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 10px; border-radius: 99px;
        font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em;
        margin-bottom: 20px; border: 1px solid var(--border); color: var(--idle);
    }
    h1 { font-size: 15px; font-weight: 600; margin: 0 0 6px; display: flex; align-items: center; gap: 8px; color: var(--muted); letter-spacing: .02em; text-transform: uppercase; }
    h1 svg { width: 16px; height: 16px; flex-shrink: 0; }
    .desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin: 0 0 18px; }

    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .section-title-toggle { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 10px; display: flex; align-items: center; gap: 8px; cursor: pointer; -webkit-user-select: none; user-select: none; }
    .toggle-line    { flex: 1; height: 1px; background: var(--border); }
    .toggle-chevron { width: 11px; height: 11px; flex-shrink: 0; transition: transform .2s; }
    .toggle-chevron.open { transform: rotate(180deg); }

    .auth-area  { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .auth-input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--input-bg); color: var(--fg); font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s; font-family: inherit; }
    .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); }
    .auth-input.error { border-color: var(--danger); box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 12%, transparent); }
    .auth-hint { font-size: 12px; color: var(--danger); min-height: 16px; margin: 0; }
    .btn-auth { width: 100%; padding: 11px 14px; border-radius: 10px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; transition: opacity .18s, transform .12s; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; }
    .btn-auth:hover   { opacity: .88; transform: translateY(-1px); }
    .btn-auth:active  { opacity: .95; transform: translateY(0); }
    .btn-auth:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-auth svg     { width: 15px; height: 15px; flex-shrink: 0; }
    .retry-area { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .retry-msg  { font-size: 13px; color: var(--muted); margin: 0; line-height: 1.6; }

    /* === Tab 1: overview === */
    .hero-summary {
        padding: 14px 18px;
        background: color-mix(in srgb, var(--accent) 6%, transparent);
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
        border-left: 3px solid var(--accent);
        margin-bottom: 16px;
        display: flex; align-items: flex-start; gap: 10px;
    }
    .hero-summary svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; color: var(--accent); }
    .hero-summary-text { font-size: 13px; color: var(--fg); line-height: 1.7; flex: 1; }
    .hero-summary-text .hl      { font-weight: 700; color: var(--accent); }
    .hero-summary-text .hl-ok   { font-weight: 700; color: var(--success); }
    .hero-summary-text .hl-warn { font-weight: 700; color: var(--warning); }

    /* ── 摘要芯片：紧凑化 ── */
    .summary-chips-grid { display: grid; gap: 8px; margin-bottom: 14px; }

    .summary-chip {
        padding: 10px 12px;            /* 原 14px 16px，缩减消除空旷感 */
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        display: flex; flex-direction: column; gap: 2px;
        position: relative; overflow: hidden;
        transition: border-color .15s, background .15s;
    }
    .summary-chip:hover {
        border-color: color-mix(in srgb, var(--accent) 30%, transparent);
        background: color-mix(in srgb, var(--accent) 4%, transparent);
    }
    .chip-icon {
        width: 22px; height: 22px;     /* 原 28px，缩小 */
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 4px; flex-shrink: 0;
    }
    .chip-icon svg { width: 12px; height: 12px; }
    .chip-value { font-size: 19px; font-weight: 800; line-height: 1; letter-spacing: -.02em; }
    .chip-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .chip-sub   { font-size: 10px; color: var(--muted); opacity: .7; margin-top: 1px; }

    .unlock-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .unlock-tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); background: var(--glass-bg); }
    .unlock-tag .ut-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .unlock-tag .ut-count { color: var(--muted); font-size: 10px; }

    .overview-grid { display: grid; gap: 12px; }
    .stat-panel { padding: 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass-bg); }
    .panel-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 12px; }
    .quality-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .quality-item { flex: 1; text-align: center; padding: 10px 4px; border-radius: 8px; background: var(--input-bg); border: 1px solid var(--border); }
    .quality-val   { font-size: 20px; font-weight: 700; }
    .quality-label { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .cf-breakdown { display: flex; flex-direction: column; gap: 5px; }
    .cf-group { display: flex; align-items: flex-start; gap: 6px; }
    .cf-group-title { flex-shrink: 0; width: 68px; font-weight: 600; padding-top: 2px; font-size: 10px; }
    .cf-tags  { display: flex; flex-wrap: wrap; gap: 3px; }
    .cf-tag   { display: inline-flex; align-items: center; gap: 2px; padding: 1px 6px; border-radius: 99px; border: 1px solid var(--border); font-size: 10px; background: var(--glass-bg); }
    .cf-tag em { font-style: normal; color: var(--muted); }
    .nav-card { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); cursor: pointer; font-family: inherit; color: var(--fg); transition: border-color .15s, background .15s; text-align: left; width: 100%; margin-bottom: 6px; }
    .nav-card:last-child { margin-bottom: 0; }
    .nav-card:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 6%, transparent); }
    .nav-card-left { display: flex; align-items: center; gap: 8px; }
    .nav-card-left svg { width: 13px; height: 13px; color: var(--muted); flex-shrink: 0; }
    .nav-card-label { font-size: 13px; font-weight: 600; }
    .nav-card-right { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .nav-card-right svg { width: 11px; height: 11px; opacity: .5; }

    /* === Tab 2: geo === */
    .geo-view { border-radius: 12px; border: 1px solid var(--border); background: var(--glass-bg); overflow: hidden; margin-bottom: 4px; }
    .map-slot { width: 100%; aspect-ratio: 16/7; min-height: 160px; max-height: 360px; display: none; align-items: center; justify-content: center; background: var(--input-bg); border-bottom: 1px dashed color-mix(in srgb, var(--border) 80%, transparent); }
    .map-slot-hint { text-align: center; opacity: .35; }
    .map-slot-hint svg { width: 28px; height: 28px; margin: 0 auto 6px; display: block; }
    .map-slot-hint span { font-size: 11px; color: var(--muted); }
    .geo-split { display: grid; grid-template-columns: 1fr 1fr; }
    .geo-col   { padding: 14px 16px; }
    .geo-col + .geo-col { border-left: 1px solid var(--border); }
    .geo-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .geo-key { font-size: 11px; font-weight: 600; width: 28px; flex-shrink: 0; color: var(--fg); }
    .geo-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .geo-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width .5s ease; }
    .geo-val { font-size: 11px; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }

    /* === Tab 3: proto === */
    .proto-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .proto-card { padding: 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass-bg); display: flex; flex-direction: column; gap: 8px; transition: border-color .15s, transform .15s; }
    .proto-card:hover { border-color: var(--proto-color, var(--accent)); transform: translateY(-1px); }
    .proto-card-header { display: flex; align-items: center; justify-content: space-between; }
    .proto-card-name  { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .proto-card-count { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
    .proto-card-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .proto-card-bar  { height: 100%; border-radius: 99px; background: var(--proto-color, var(--accent)); transition: width .6s cubic-bezier(.4,0,.2,1); }
    .proto-card-pct  { font-size: 10px; color: var(--muted); font-weight: 600; }
    .proto-vless    { --proto-color: #0ea5a0; } .proto-vmess  { --proto-color: #d97706; }
    .proto-trojan   { --proto-color: #7c3aed; } .proto-ss     { --proto-color: #2563eb; }
    .proto-ssr      { --proto-color: #1d4ed8; } .proto-http   { --proto-color: #059669; }
    .proto-socks5   { --proto-color: #64748b; } .proto-hysteria { --proto-color: #db2777; }
    .proto-hy2      { --proto-color: #be185d; } .proto-tuic   { --proto-color: #0891b2; }
    .proto-summary-bar { display: flex; height: 8px; border-radius: 99px; overflow: hidden; gap: 1px; margin-bottom: 16px; }
    .proto-summary-seg { height: 100%; border-radius: 1px; }
    .proto-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .proto-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .proto-legend-dot  { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* === Tab 4: subs + copy toolbar === */
    /*
     * copy-toolbar：永不换行（flex-wrap:nowrap）
     * 按钮文字放在 span.btn-text 里，720px 以下 CSS 隐藏，仅剩图标
     */
    .copy-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 9px 12px;
        margin-bottom: 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        flex-wrap: nowrap;    /* 永不换行 */
        overflow: hidden;
    }
    .copy-toolbar-label {
        font-size: 11px; font-weight: 600; color: var(--muted);
        flex-shrink: 0; white-space: nowrap;
    }
    @media (max-width: 480px) { .copy-toolbar-label { display: none; } }

    .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 10px;
        border-radius: 7px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--fg);
        font-size: 11px; font-weight: 600; font-family: inherit;
        cursor: pointer;
        transition: color .15s, border-color .15s, background .15s;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .copy-btn svg { width: 11px; height: 11px; flex-shrink: 0; }
    .copy-btn:hover  { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .copy-btn.copied { color: var(--success); border-color: var(--success); background: color-mix(in srgb, var(--success) 8%, transparent); }

    .copy-scope { margin-left: auto; display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }
    .copy-scope label { display: flex; align-items: center; gap: 4px; cursor: pointer; }

    .sub-list { display: flex; flex-direction: column; gap: 8px; }
    .sub-item { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass-bg); transition: background .15s; }
    .sub-item:hover { background: var(--input-bg); }
    .sub-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; min-width: 0; }
    .sub-rank { flex-shrink: 0; width: 18px; height: 18px; border-radius: 4px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--muted); }
    .sub-item:nth-child(1) .sub-rank { background: color-mix(in srgb, gold   30%, transparent); color: #b8860b; }
    .sub-item:nth-child(2) .sub-rank { background: color-mix(in srgb, silver 30%, transparent); color: #64748b; }
    .sub-item:nth-child(3) .sub-rank { background: color-mix(in srgb, #cd7f32 25%, transparent); color: #cd7f32; }
    .sub-url { flex: 1; font-size: 11px; font-family: var(--font-mono,monospace); color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .sub-rate  { font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .sub-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
    .sub-bar  { height: 100%; border-radius: 99px; transition: width .5s ease; }
    .sub-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; font-size: 11px; color: var(--muted); }
    .tag-pill { padding: 1px 6px; border-radius: 4px; background: var(--input-bg); border: 1px solid var(--border); font-size: 10px; white-space: nowrap; }
    .bad-list { border-radius: 10px; border: 1px solid var(--border); overflow: hidden; background: var(--glass-bg); }
    .bad-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); gap: 8px; }
    .bad-item:last-child { border-bottom: none; }
    .bad-url { font-size: 11px; font-family: var(--font-mono,monospace); color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .bad-count { font-size: 11px; color: var(--muted); flex-shrink: 0; }

    /* === Tab 5: config analysis === */
    .cfg-analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .cfg-card { padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass-bg); }
    .cfg-card-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .cfg-card-title svg { width: 12px; height: 12px; flex-shrink: 0; }
    .cfg-kv { display: flex; align-items: baseline; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent); gap: 8px; }
    .cfg-kv:last-child { border-bottom: none; }
    .cfg-k { font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .cfg-v { font-size: 12px; font-weight: 600; color: var(--fg); text-align: right; word-break: break-all; }
    .cfg-v.ok   { color: var(--success); }
    .cfg-v.warn { color: var(--warning); }
    .cfg-v.bad  { color: var(--danger); }
    .suggest-list { display: flex; flex-direction: column; gap: 6px; }
    .suggest-item { display: flex; gap: 8px; align-items: flex-start; padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.5; border: 1px solid transparent; }
    .suggest-item svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; }
    .suggest-item.info { background: color-mix(in srgb, var(--accent)  8%, transparent); border-color: color-mix(in srgb, var(--accent)  20%, transparent); }
    .suggest-item.warn { background: color-mix(in srgb, var(--warning) 8%, transparent); border-color: color-mix(in srgb, var(--warning) 20%, transparent); }
    .suggest-item.good { background: color-mix(in srgb, var(--success) 8%, transparent); border-color: color-mix(in srgb, var(--success) 20%, transparent); }
    .suggest-item.info svg { color: var(--accent);  }
    .suggest-item.warn svg { color: var(--warning); }
    .suggest-item.good svg { color: var(--success); }

    /* loading / footer */
    .loading-dots::after { content: ''; animation: dots 1.2s steps(4,end) infinite; }
    @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
    .page-footer { padding: 10px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 16px; background: var(--glass-bg); flex-shrink: 0; }
    .footer-icons { display: flex; align-items: center; gap: 12px; }
    .footer-icon  { width: 15px; height: 15px; opacity: .6; transition: opacity .15s; display: block; filter: invert(var(--invert)); }
    .footer-icons a:hover .footer-icon { opacity: .75; }
    .footer-copy  { font-size: 11px; color: var(--muted); }
    .footer-copy a { color: var(--muted); text-decoration: none; }
    .footer-copy a:hover { color: var(--accent); }
    code { font-family: var(--font-mono,monospace); background: var(--placehoder-bg,rgba(0,0,0,.06)); color: var(--danger); padding: 1px 5px; border-radius: 4px; font-size: 11px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

<script>
// ── theme ──
(function(){
    const saved=localStorage.getItem('theme');
    const prefer=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
    applyTheme(saved||prefer);
})();
function applyTheme(theme){
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem('theme',theme);
    const isDark=theme==='dark';
    const moon=document.getElementById('iconMoon');
    const sun=document.getElementById('iconSun');
    const label=document.getElementById('themeLabel');
    if(moon)moon.style.display=isDark?'block':'none';
    if(sun)sun.style.display=isDark?'none':'block';
    if(label)label.textContent=isDark?'深色':'浅色';
    const btn=document.getElementById('themeToggle');
    if(btn)btn.setAttribute('aria-pressed',String(isDark));
}
document.getElementById('themeToggle')?.addEventListener('click',()=>{
    const cur=document.documentElement.getAttribute('data-theme');
    applyTheme(cur==='dark'?'light':'dark');
});

const STORAGE_KEY='subscheck_api_key';
function getKey(){try{return localStorage.getItem(STORAGE_KEY)||sessionStorage.getItem(STORAGE_KEY)||null;}catch{return null;}}

async function sfetch(url,opts={}){
    const key=getKey();
    if(!key)return{ok:false,status:401,error:'未认证'};
    opts.headers={...opts.headers,'X-API-Key':key};
    try{
        const r=await fetch(url,opts);
        const ct=r.headers.get('content-type')||'';
        const text=await r.text();
        const payload=ct.includes('application/json')?JSON.parse(text):text;
        if(r.status===401){try{localStorage.removeItem(STORAGE_KEY);}catch{}showLoginArea('API 密钥已失效，请重新输入。');return{ok:false,status:401,payload};}
        return r.ok?{ok:true,status:r.status,payload}:{ok:false,status:r.status,payload};
    }catch(e){return{ok:false,error:e.message};}
}

function showScene(name){
    document.getElementById('loginScene').style.display=name==='login'?'flex':'none';
    document.getElementById('reportScene').style.display=name==='report'?'flex':'none';
}
function showLoading(){
    showScene('login');_setBadge('Analysis Report');
    document.getElementById('placeholderMsg').style.display='';
    document.getElementById('inlineLoginArea').style.display='none';
    document.getElementById('retryArea').style.display='none';
}
function showLoginArea(hint=''){
    showScene('login');_setBadge('Auth Required');
    document.getElementById('placeholderMsg').style.display='none';
    document.getElementById('inlineLoginArea').style.display='';
    document.getElementById('retryArea').style.display='none';
    const input=document.getElementById('inlineApiKey');
    const hintEl=document.getElementById('loginHint');
    if(hint){input.classList.add('error');hintEl.textContent=hint;}
    else{input.classList.remove('error');hintEl.textContent='';input.placeholder='输入 API 密钥...';}
    setTimeout(()=>input.focus(),50);
}
function showRetryArea(msg,badge='Error'){
    showScene('login');_setBadge(badge);
    document.getElementById('placeholderMsg').style.display='none';
    document.getElementById('inlineLoginArea').style.display='none';
    document.getElementById('retryArea').style.display='';
    document.getElementById('retryMsg').textContent=msg;
}
function _setBadge(text){document.getElementById('placeholderBadge').textContent=text;}

function switchTab(name){
    document.querySelectorAll('.sidebar-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+name));
}

async function inlineLogin(){
    const input=document.getElementById('inlineApiKey');
    const btn=document.getElementById('inlineLoginBtn');
    const hintEl=document.getElementById('loginHint');
    const k=input?.value?.trim();
    input.classList.remove('error');hintEl.textContent='';
    if(!k){input.classList.add('error');hintEl.textContent='请输入 API 密钥';input.focus();return;}
    btn.disabled=true;
    try{
        const resp=await fetch('/api/status',{headers:{'X-API-Key':k}});
        if(resp.status===401){input.classList.add('error');hintEl.textContent='API 密钥无效，请重试';input.value='';input.focus();return;}
        if(!resp.ok){showRetryArea(`验证失败（HTTP ${resp.status}），请检查服务状态。`);return;}
        try{localStorage.setItem(STORAGE_KEY,k);}catch{}
        await loadReport();
    }catch(e){showRetryArea(`网络错误：${e.message}`);}
    finally{btn.disabled=false;}
}

async function loadReport(){
    showLoading();
    const r=await sfetch('/api/analysis-report');
    if(!r.ok){if(r.status!==401)showRetryArea(`加载失败（HTTP ${r.status}），请检查服务是否正常。`);return;}
    if(!r.payload?.report){showRetryArea('尚未生成检测报告，请先在主界面运行一次节点检测。','No Data');return;}
    try{
        const report=YAML.parse(r.payload.report);
        renderReport(report);showScene('report');
    }catch(e){showRetryArea(`报告解析失败：${e.message}`);}
}

function doLogout(){try{localStorage.removeItem(STORAGE_KEY);}catch{}showLoginArea();}
async function initPage(){if(!getKey()){showLoginArea();return;}await loadReport();}
window.addEventListener('storage',e=>{if(e.key===STORAGE_KEY&&!e.newValue)showLoginArea('已在其他页面退出登录，请重新输入。');});

// ══════════════════════════════════════════════════════════════
// render
// ══════════════════════════════════════════════════════════════
let _reportData=null;

function renderReport(r){
    _reportData=r;
    const ci=r.check_info||{};
    const ga=r.global_analysis||{};
    const sr=r.subs_ranking||[];
    const sb=r.subs_ranking_bad||[];
    document.getElementById('navMeta').textContent=ci.check_time?`${ci.check_time}  ·  耗时 ${ci.check_duration||'-'}`:'分析报告';
    const geoCount=Object.keys(ga.geography_distribution||{}).length;
    const protoCount=Object.keys(ga.protocol_distribution||{}).length;
    _sb('sb-geo',geoCount);_sb('sb-proto',protoCount);_sb('sb-subs',sr.length);
    renderOverview(r,ci,ga,sr.length,geoCount,protoCount);
    renderGeo(ga);renderProto(ga);renderSubs(sr,sb);renderConfig(ci,ga,sr,sb);
}
function _sb(id,val){const el=document.getElementById(id);if(el)el.textContent=val;}

// ── Tab 1: overview ──────────────────────────────────────────
function renderOverview(r,ci,ga,subCount,geoCount,protoCount){
    const rawSummary=(r.summary||'').trim();
    document.getElementById('heroSummary').innerHTML=`
        <div class="hero-summary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <div class="hero-summary-text">${buildHeroSentence(ci,ga)}</div>
        </div>`;

    const minSpeedVal=ci.check_min_speed;
    const minSpeedStr=(minSpeedVal&&String(minSpeedVal)!=='0')?minSpeedVal+' KB/s':'未开启';
    const total=ga.alive_count||0;
    const qm=ga.quality_metrics||{};
    const cfd=qm.cf_details||{};
    const cfCon=cfd['consistent_\u00b9\u207a']||{};

function parseUnlockFromSummary(text){
    const colors={'Netflix':'#e50914','YouTube':'#ff0000','Disney+':'#113ccf','TikTok':'#010101','GPT+':'#10a37f','GPT':'#10a37f','Gemini':'#4285f4'};
    const result=[];
    for(const m of [text.match(/流媒体解锁:\s*\[([^\]]*)\]/),text.match(/AI 解锁\[([^\]]*)\]/)]){
        if(!m)continue;
        for(const item of m[1].split(',').map(s=>s.trim()).filter(Boolean)){
            const[name,count]=item.split(':').map(s=>s.trim());
            if(name&&count)result.push({name,count,color:colors[name]||'var(--muted)'});
        }
    }
    return result;
}

function cfGroup(title,obj,color){
    const entries=Object.entries(obj).sort((a,b)=>b[1]-a[1]);
    if(!entries.length)return'';
    return`<div class="cf-group"><span class="cf-group-title" style="color:${color}">${title}</span><span class="cf-tags">${entries.map(([k,v])=>`<span class="cf-tag">${k}<em>${v}</em></span>`).join('')}</span></div>`;
}

// 复制功能 —— 修复 iOS / HTTP 环境下剪贴板失效
// ════════════════════════════════════════════════════════════
/**
 * writeClipboard(text) → Promise<boolean>
 *
 * 优先使用 navigator.clipboard（需 HTTPS / localhost）
 * 降级：构造不可见 textarea，走 selection + execCommand
 * iOS 专项处理：使用 createRange + setSelectionRange
 * （iOS Safari 不支持 position:fixed 元素的 select()）
 */
async function writeClipboard(text){
    if(navigator.clipboard&&window.isSecureContext){
        try{await navigator.clipboard.writeText(text);return true;}
        catch(e){/* fall through */}
    }
    // 降级方案
    const ta=document.createElement('textarea');
    ta.value=text;
    ta.setAttribute('readonly','');
    // 定位到当前滚动位置内，不影响布局，iOS 不能用 fixed
    ta.style.cssText=[
        'position:absolute',
        'top:'+(window.scrollY||document.documentElement.scrollTop)+'px',
        'left:0','width:1px','height:1px',
        'padding:0','border:none','outline:none',
        'box-shadow:none','background:transparent','opacity:0',
    ].join(';');
    document.body.appendChild(ta);

    const isIOS=/ipad|iphone/i.test(navigator.userAgent);
    if(isIOS){
        // iOS 需要 createRange + setSelectionRange 才能选中
        const range=document.createRange();
        range.selectNodeContents(ta);
        const sel=window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        ta.setSelectionRange(0,999999);
    }else{
        ta.select();
    }

    let ok=false;
    try{ok=document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);
    return ok;
}

function copyUrls(asYaml){
    if(!_reportData)return;
    const subs=_reportData.subs_ranking||[];
    const subsBad=_reportData.subs_ranking_bad||[];
    const includeBad=document.getElementById('copyIncludeBad')?.checked;
    const btnId=asYaml?'copyYamlBtn':'copyUrlsBtn';
    let text='';

    if(asYaml){
        const fmt=s=>{
            const st=s.stats||{};
            const protos=s.protocols?Object.entries(s.protocols).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}: ${v}`).join('; '):'';
            return`  - ${s.url} # ${String(st.rate||'0%')} (${st.success||0}/${st.total||0})${protos?' ['+protos+']':''}`;
        };
        text=`# 达标订阅列表\nsub-urls:\n`+subs.map(fmt).join('\n');
        if(includeBad&&subsBad.length){
            text+=`\n\n# 成功率为 0 的订阅\nsub-urls-bad:\n`+subsBad.map(s=>{const st=s.stats||{};return`  - ${s.url} # 0.0% (${st.success||0}/${st.total||0})`;}).join('\n');
        }
    }else{
        text=subs.map(s=>s.url).join('\n');
        if(includeBad&&subsBad.length)text+='\n\n# 失效订阅\n'+subsBad.map(s=>s.url).join('\n');
    }

    const btn=document.getElementById(btnId);
    writeClipboard(text).then(ok=>{
        if(!btn)return;
        const prev=btn.innerHTML;
        if(ok){
            btn.classList.add('copied');
            btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span class="btn-text">已复制</span>`;
            setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=prev;},2000);
        }else{
            btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="btn-text">请手动复制</span>`;
            setTimeout(()=>{btn.innerHTML=prev;},2500);
        }
    });
}

// ── Tab 5: config analysis ───────────────────────────────────
function renderConfig(ci,ga,sr,sb){
    const total=ga.alive_count||0;
    const qm=ga.quality_metrics||{};
    const checked=parseInt(ci.check_count)||0;
    const speed=parseInt(ci.check_min_speed)||0;
    const badCnt=sb.length,goodCnt=sr.length;
    const passRate=checked>0?Math.round(total/checked*100):0;
    const geoCount=Object.keys(ga.geography_distribution||{}).length;
    const protoCount=Object.keys(ga.protocol_distribution||{}).length;

    let vps={};
    for(const[k,v]of Object.entries(qm)){if(k.startsWith('vps_details')&&typeof v==='object'){vps=v;break;}}
    const vpsTotal=Object.values(vps).reduce((a,b)=>a+b,0);

    const kvs=[
        {k:'检测节点数',v:ci.check_count||'-'},
        {k:'检测耗时',v:ci.check_duration||'-'},
        {k:'流量消耗',v:ci.check_traffic||'-'},
        {k:'速度下限',v:speed>0?speed+' KB/s':'未设置',cls:speed>0?'ok':'warn'},
        {k:'可用节点',v:total,cls:total>0?'ok':'bad'},
        {k:'通过率',v:passRate+'%',cls:passRate>=20?'ok':passRate>5?'warn':'bad'},
        {k:'有效订阅',v:goodCnt},
        {k:'失效订阅',v:badCnt,cls:badCnt>0?(badCnt>goodCnt?'bad':'warn'):'ok'},
        {k:'检测时间',v:ci.check_time||'-'},
    ];

    const suggests=[];
    if(speed===0)suggests.push({l:'warn',t:'未设置速度下限，所有节点（含极慢节点）都被收录。建议设置 <code>check-min-speed: 500</code> 过滤低速节点。'});
    else if(speed<200)suggests.push({l:'info',t:`速度下限 ${speed} KB/s 较低，慢速节点仍会被收录，可视场景适当提高。`});
    else suggests.push({l:'good',t:`速度下限 ${speed} KB/s 设置合理，可有效过滤低质量节点。`});

    if(passRate===0&&checked>0)suggests.push({l:'warn',t:'通过率为 0%，未获得任何可用节点。请检查订阅源可用性或网络连接。'});
    else if(passRate<5&&checked>0)suggests.push({l:'warn',t:`通过率仅 ${passRate}%，远低于正常水平（15–40%）。建议检查网络或订阅源质量。`});
    else if(passRate>=40)suggests.push({l:'good',t:`通过率 ${passRate}%，节点质量优秀。`});

    const totalSubs=goodCnt+badCnt;
    if(badCnt>0&&totalSubs>0){
        const r=Math.round(badCnt/totalSubs*100);
        if(r>50)suggests.push({l:'warn',t:`失效订阅占比 ${r}%（${badCnt}/${totalSubs}），超半数失效，建议清理或替换。`});
        else suggests.push({l:'info',t:`存在 ${badCnt} 个失效订阅（占比 ${r}%），可前往"订阅排名"标签查看。`});
    }else if(badCnt===0&&goodCnt>0)suggests.push({l:'good',t:'所有订阅源均有效，订阅源状况良好。'});

    const cfNum=parseFloat(qm.cf_consistent_ratio)||0;
    if(cfNum>80)suggests.push({l:'info',t:`CF 中转节点占比 ${qm.cf_consistent_ratio||cfNum+'%'} 偏高，CF 节点稳定性不及独立 VPS，建议补充直连节点。`});
    if(geoCount>=10)suggests.push({l:'good',t:`节点覆盖 ${geoCount} 个国家/地区，地理分布良好。`});
    else if(geoCount>0&&geoCount<5)suggests.push({l:'info',t:`节点仅覆盖 ${geoCount} 个地区，分布较集中，如有多地区需求建议增加订阅源。`});
    if(protoCount===1)suggests.push({l:'info',t:'所有节点使用同一协议，多协议可提升在不同网络环境下的兼容性。'});

    const iconOk=()=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const iconWarn=()=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
    const iconInfo=()=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    const getIcon=l=>l==='good'?iconOk():l==='warn'?iconWarn():iconInfo();
    const suggestMap={'good':'good','warn':'warn','info':'info'};

    document.getElementById('cfganaContent').innerHTML=`
        <div class="section-title">本次检测参数</div>
        <div class="cfg-analysis-grid">
            <div class="cfg-card">
                <div class="cfg-card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    运行参数
                </div>
                ${kvs.map(kv=>`<div class="cfg-kv"><span class="cfg-k">${kv.k}</span><span class="cfg-v ${kv.cls||''}">${kv.v}</span></div>`).join('')}
            </div>
            <div class="cfg-card">
                <div class="cfg-card-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    节点分布概要
                </div>
                <div class="cfg-kv"><span class="cfg-k">覆盖地区</span><span class="cfg-v">${geoCount} 个</span></div>
                <div class="cfg-kv"><span class="cfg-k">协议种类</span><span class="cfg-v">${protoCount} 种</span></div>
                <div class="cfg-kv"><span class="cfg-k">CF 中转占比</span><span class="cfg-v">${qm.cf_consistent_ratio||'-'}</span></div>
                <div class="cfg-kv"><span class="cfg-k">独立 VPS 占比</span><span class="cfg-v">${total>0?Math.round(vpsTotal/total*100)+'%':'-'}</span></div>
                <div class="cfg-kv"><span class="cfg-k">最优订阅节点数</span><span class="cfg-v ok">${sr[0]?(sr[0].stats?.success||'-')+' 个':'-'}</span></div>
                <div class="cfg-kv"><span class="cfg-k">最优订阅通过率</span><span class="cfg-v ok">${sr[0]?String(sr[0].stats?.rate||'-'):'-'}</span></div>
            </div>
        </div>
        <div class="section-title" style="margin-top:8px">优化建议</div>
        <div class="suggest-list">
            ${suggests.length
                ?suggests.map(s=>`<div class="suggest-item ${suggestMap[s.l]}">${getIcon(s.l)}<span>${s.t}</span></div>`).join('')
                :'<p style="color:var(--muted);font-size:13px">暂无建议，配置状态良好。</p>'}
        </div>`;
}

function toggleBad(){
    const list=document.getElementById('badList'),chevron=document.getElementById('badChevron');
    const open=list.style.display==='none';
    list.style.display=open?'':'none';
    chevron.classList.toggle('open',open);
}

function esc(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

initPage();
</script>
