# update: 2026-06-27 21:30:42
# repo: https://github.com/sinspired/subs-check-pro 内置规则

log-level: error # 日志等级 silent/error/warning/info/debug

port: 7890 # HTTP(S) 代理服务器端口
socks-port: 7891 # SOCKS5 代理端口
mixed-port: 10801 # HTTP(S) 和 SOCKS 代理混合端口

allow-lan: true # 允许局域网连接

authentication: # http,socks 入口的验证用户名，密码
  - "sinspired:sinspired"
skip-auth-prefixes: # 设置跳过验证的 IP 段
  - 127.0.0.1/8
  - ::1/128

#  find-process-mode has 3 values:always, strict, off
#  - always, 开启，强制匹配所有进程
#  - strict, 默认，由 mihomo 判断是否开启
#  - off, 不匹配进程，推荐在路由器上使用此模式
find-process-mode: strict

ipv6: true # 开启 IPv6 总开关，关闭阻断所有 IPv6 链接和屏蔽 DNS 请求 AAAA 记录

### 全局配置
profile:
  store-selected: true
  store-fake-ip: true

unified-delay: true # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差异
tcp-concurrent: true # TCP 并发

hosts:
  sub.store: 127.0.0.1
  subs.check: 127.0.0.1
  # > Encrypted DNS
  dns.google: 8.8.8.8
  dns64.dns.google: 2001:4860:4860::6464
  cloudflare-dns.com: 104.16.249.249
  1dot1dot1dot1.cloudflare-dns.com: 1.1.1.1
  one.one.one.one: 1.1.1.1
  dns.alidns.com: 223.5.5.5
  doh.pub: 1.12.12.12
  dot.pub: 1.12.12.12
  doh.360.cn: 23.6.48.18
  dot.360.cn: 101.198.198.198
  dns.twnic.tw: 101.101.101.101
  ordns.he.net: 74.82.42.42

ntp:
  enable: false
  server: "time.apple.com"
  port: 123
  interval: 30
  dialer-proxy: ""
  write-to-system: false
  
dns:
  enable: true
  # lru: Least Recently Used, 默认值
  # arc: Adaptive Replacement Cache # 自适应替换缓存
  cache-algorithm: arc
  listen: "0.0.0.0:1053"
  ipv6: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.local"
    - "*.lan"
    - "*.localdomain"
    - "*.home.arpa"
    - "*.test"
    - "*.invalid"
    - "*.example"
    - "localhost.ptlogin2.qq.com"
    - "time.*.com"
    - "ntp.*.com"
    - "+.push.apple.com"
    - "+.miwifi.com"
    - "+.market.xiaomi.com"
    - "geosite:cn"
    - "geosite:private"
    - "RULE-SET,cn_domain"
    - "RULE-SET,private"

  # 部分客户端，比如 clash party 还不支持
  # fake-ip-filter-mode: rule
  # fake-ip-filter:
  #   # 1. 本地域名不 fake-ip
  #   - DOMAIN-SUFFIX,local,real-ip
  #   - DOMAIN-SUFFIX,lan,real-ip
  #   - DOMAIN-SUFFIX,localdomain,real-ip
  #   - DOMAIN-SUFFIX,home.arpa,real-ip
  #   - DOMAIN-SUFFIX,test,real-ip
  #   - DOMAIN-SUFFIX,invalid,real-ip
  #   - DOMAIN-SUFFIX,example,real-ip

  #   # 2. 特定域名
  #   - DOMAIN,localhost.ptlogin2.qq.com,real-ip
  #   - DOMAIN-SUFFIX,push.apple.com,real-ip
  #   - DOMAIN-SUFFIX,miwifi.com,real-ip
  #   - DOMAIN-SUFFIX,market.xiaomi.com,real-ip
  #   - DOMAIN-KEYWORD,time,real-ip
  #   - DOMAIN-KEYWORD,ntp,real-ip

  #   # 3. 引入规则集
  #   - RULE-SET,cn_domain,real-ip
  #   - RULE-SET,private,real-ip

  #   - RULE-SET,geolocation-!cn,fake-ip

  #   # 4. 自定义的规则
  #   - DOMAIN,www.baidu.com,real-ip
  #   - DOMAIN-SUFFIX,qq.com,real-ip
  #   - DOMAIN-SUFFIX,jd.com,real-ip

  #   # 5. 默认行为
  #   - MATCH,fake-ip

  prefer-h3: true
  dns-hijack:
    - any:53
    - tcp://any:53

  # 用于解析 nameserver，fallback 以及其他 DNS 服务器配置的，DNS 服务域名
  # 只能使用纯 IP 地址，可使用加密 DNS
  default-nameserver:
    - 114.114.114.114
    - 8.8.8.8
    - tls://1.12.12.12:853
    - tls://223.5.5.5:853
    - system # append DNS server from system configuration. If not found, it would print an error log and skip.
  nameserver-policy:
