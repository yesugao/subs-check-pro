      - https://doh.pub/dns-query#h3=true
      - system
    # 国外
    geosite:gfw:
      - https://cloudflare-dns.com/dns-query#h3=true
      - https://dns.google/dns-query#h3=true
    # 广告
    geosite:category-ads-all: "rcode://success"
    www.baidu.com,+.google.cn:
      - "223.5.5.5"
      - "https://dns.alidns.com/dns-query"
  # DNS 主要域名配置
  # 支持 UDP，TCP，DoT，DoH，DoQ
  # 这部分为主要 DNS 配置，影响所有直连，确保使用对大陆解析精准的 DNS
  nameserver:
    - 114.114.114.114 # default value
    - 8.8.8.8 # default value
    - tls://223.5.5.5:853 # DNS over TLS
    - https://doh.pub/dns-query # DNS over HTTPS
    - https://dns.alidns.com/dns-query#h3=true # 强制 HTTP/3，与 perfer-h3 无关，强制开启 DoH 的 HTTP/3 支持，若不支持将无法使用
    - https://mozilla.cloudflare-dns.com/dns-query#DNS&h3=true # 指定策略组和使用 HTTP/3
    - dhcp://en0 # dns from dhcp
    - quic://dns.adguard.com:784 # DNS over QUIC
    # - '8.8.8.8#RULES' # 效果同respect-rules，但仅对该服务器生效
    # - '8.8.8.8#en0' # 兼容指定 DNS 出口网卡
  proxy-server-nameserver:
    - quic://223.5.5.5:853
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query#h3=true
  direct-nameserver:
    #- quic://223.5.5.5:853
    #- quic://223.6.6.6:853
    - system
  direct-nameserver-follow-policy: true # 是否遵循nameserver-policy，默认为不遵守，仅当direct-nameserver不为空时生效
  fallback:
    - https://1.1.1.1/dns-query#h3=true
    - https://1.0.0.1/dns-query#h3=true
    - https://8.8.8.8/dns-query#h3=true
    - https://8.8.4.4/dns-query#h3=true
    - tls://8.8.4.4
    - tls://1.1.1.1
  # 后备域名解析服务器筛选，满足条件的将使用 fallback结果或只使用 fallback解析
  fallback-filter:
    geoip: true
    # 可选值为 国家缩写，默认值为 CN,除了 geoip-code 配置的国家 IP, 其他的 IP 结果会被视为污染,geoip-code 配置的国家的结果会直接采用，否则将采用 fallback结果
    geoip-code: CN
    ipcidr: #书写内容为 IP/掩码,这些网段的结果会被视为污染，nameserver 解析出这些结果时将会采用 fallback的解析结果
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 223.75.236.241/32
      - 182.43.124.6/32
      - 106.74.25.198/32
      - 183.192.65.101/32
    domain: # 这些域名被视为已污染，匹配到这些域名，会直接使用 fallback解析，不去使用 nameserver
      - "+.google.com"
      - "+.youtube.com"
      - "+.twitter.com"
      - "+.x.com"
      - "+.reddit.com"
      - "+.telegram.org"
      - "+.instagram.com"
      - "+.facebook.com"
      - "+.jsdelivr.net"
      - "+.proton.me"
      - "+.chatgpt.com"
      - "+.openai.com"
      - "+.grok.com"

